<!DOCTYPE html>
<html lang="en">
<head>
  
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% load static %}
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    
   
    <title>{%block title%}titre{%endblock%}</title>
</head>
<body>
    <header>
        <div class="logo">
            
            <img src="{% static 'images/logo.png'%}" alt="logo">
        </div>
       
      <ul>
        <li><a href="index.html">Acceuil</a></li>
        <li><a href="#">Restaurant</a></li>
        <li><a href="#">cours de cuisine</a></li>
        <li><a href="traiteurs.html">Traiteurs</a></li>
        <li><a href="#">Contact</a></li>
      </ul>
      
     
        {%if user.is_authenticated%}
         <li>{{user.usernanme}}</li>
         <form  action = "{%url 'logout' %}" method="post">

            {%csrf_token%}
         <button class="boutton-connexion" type="submit">Deconnexion</button>
        </form>
        {%else%}
          <div class="btn">
           <a  class="boutton-connexion"  href="{% url 'login'%}">Connexion</a>
           <a class="boutton-inscription" href="{% url 'inscription'%}">Inscription</a></button>
        {%endif%}
    </div>
    
        

    
    </header>
     
   {%block content%}{%endblock%}
             
     
    
</body>
</html>
