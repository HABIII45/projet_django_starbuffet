{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow-sm">
            <div class="card-header bg-dakar-primary text-white text-center py-3">
                <h4 class="mb-0 text-dark">
                    <i class="bi bi-person-plus me-2"></i>
                    Créer un compte
                </h4>
            </div>
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}

                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="id_first_name" class="form-label">
                                <i class="bi bi-person-badge me-1"></i> Prénom
                            </label>
                            <input type="text" name="first_name" class="form-control" id="id_first_name"
                                   placeholder="Votre prénom" required>
                        </div>
                        <div class="col-md-6">
                            <label for="id_last_name" class="form-label">
                                <i class="bi bi-person-badge me-1"></i> Nom
                            </label>
                            <input type="text" name="last_name" class="form-control" id="id_last_name"
                                   placeholder="Votre nom" required>
                        </div>
                    </div>

                    <div class="row g-3 mt-2">
                        <div class="col-md-6">
                            <label for="id_username" class="form-label">
                                <i class="bi bi-person me-1"></i> Nom d'utilisateur *
                            </label>
                            <input type="text" name="username" class="form-control" id="id_username"
                                   placeholder="Nom d'utilisateur" required>
                        </div>
                        <div class="col-md-6">
                            <label for="id_email" class="form-label">
                                <i class="bi bi-envelope me-1"></i> Email *
                            </label>
                            <input type="email" name="email" class="form-control" id="id_email"
                                   placeholder="votre@email.com" required>
                        </div>
                    </div>

                    <div class="row g-3 mt-2">
                        <div class="col-md-6">
                            <label for="id_password1" class="form-label">
                                <i class="bi bi-lock me-1"></i> Mot de passe *
                            </label>
                            <input type="password" name="password1" class="form-control" id="id_password1"
                                   placeholder="Mot de passe" required>
                            <small class="text-muted">Min. 8 caractères</small>
                        </div>
                        <div class="col-md-6">
                            <label for="id_password2" class="form-label">
                                <i class="bi bi-lock-fill me-1"></i> Confirmer le mot de passe *
                            </label>
                            <input type="password" name="password2" class="form-control" id="id_password2"
                                   placeholder="Confirmer mot de passe" required>
                        </div>
                    </div>

                    <div class="d-grid mt-3">
                        <button type="submit" class="btn btn-dakar btn-lg">
                            <i class="bi bi-person-check me-2"></i> S'inscrire
                        </button>
                    </div>
                </form>

                <div class="text-center mt-3">
                    <small class="text-muted">
                        Déjà un compte ?
                        <a href="{% url 'login' %}" class="text-dakar-primary text-decoration-none">
                            Se connecter ici
                        </a>
                    </small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
